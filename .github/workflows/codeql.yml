name: "CodeQL Advanced"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '35 14 * * 3'

permissions:
  security-events: write
  contents: read
  packages: read
  actions: read

jobs:
  codeql:
    uses: reactiveui/actions-common/.github/workflows/workflow-common-codeql.yml@main
    with:
      srcFolder: src
      solutionFile: Akavache.slnx
      installWorkloads: true
      analyzeCSharp: true
      analyzeActions: true
